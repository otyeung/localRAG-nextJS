services:
  postgres:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      POSTGRES_DB: ${POSTGRES_DB:-localrag_nextjs}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    expose:
      - '6333'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "(grep ' 0A ' /proc/net/tcp /proc/net/tcp6 2>/dev/null || true) | grep -q ':18BD'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  qdrant-init:
    image: node:22.18.0-alpine
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy
    working_dir: /workspace
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-1536}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-Cosine}
    volumes:
      - .:/workspace:ro
    command:
      [
        'sh',
        '-c',
        'node scripts/ensure-qdrant-collection.mjs && tail -f /dev/null',
      ]
    healthcheck:
      test: ['CMD', 'node', 'scripts/ensure-qdrant-collection.mjs']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  redis:
    image: redis:7.4.5-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - app-network

  n8n:
    image: n8nio/n8n:1.103.2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant-init:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-localrag_nextjs}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-app}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
      N8N_HOST: n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_EDITOR_BASE_URL: http://localhost:5678
      WEBHOOK_URL: http://n8n:5678/
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      N8N_SECURE_COOKIE: 'false'
      N8N_ENCRYPTION_KEY: ''
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET:-change-me-n8n-jwt-secret}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-change-me-n8n-webhook-secret}
      LOCALRAG_APP_URL: http://nextjs:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_URL: ${OPENAI_API_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LOCALRAG_DOCKER: 'true'
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-1536}
      QDRANT_DISTANCE: ${QDRANT_DISTANCE:-Cosine}
    expose:
      - '5678'
    ports:
      - '127.0.0.1:5678:5678'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - n8n_data:/home/node/.n8n
      - ./docker/n8n:/n8n-bootstrap:ro
      - app_data:/data:ro
    entrypoint: ['/bin/sh', '-c']
    command:
      - >
        n8n import:workflow --separate --input=/n8n-bootstrap/workflows --overwrite &&
        node /n8n-bootstrap/publish-targeted-workflows.mjs --input=/n8n-bootstrap/workflows &&
        n8n start
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:5678/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant-init:
        condition: service_healthy
      n8n:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_URL=${OPENAI_API_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - LOCALRAG_DOCKER=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-localrag_nextjs}?schema=app
      - N8N_BASE_URL=http://n8n:5678
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET:-change-me-n8n-webhook-secret}
      - N8N_TIMEOUT=${N8N_TIMEOUT:-30000}
      - N8N_RETRY_COUNT=${N8N_RETRY_COUNT:-3}
      - N8N_RETRY_DELAY=${N8N_RETRY_DELAY:-500}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-52428800}
      - TEMP_UPLOAD_DIRECTORY=/data/uploads
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-documents}
      - QDRANT_VECTOR_SIZE=${QDRANT_VECTOR_SIZE:-1536}
      - QDRANT_DISTANCE=${QDRANT_DISTANCE:-Cosine}
      - ANONYMOUS_COOKIE_SECRET=${ANONYMOUS_COOKIE_SECRET:-change-me-anonymous-cookie-secret}
      - REDIS_URL=redis://redis:6379
    ports:
      - '3000:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/app
      - nextjs_node_modules:/app/node_modules
      - nextjs_next:/app/.next
      - app_data:/data
    command: >
      sh -c "pnpm prisma generate &&
      pnpm prisma migrate deploy &&
      pnpm dev --hostname 0.0.0.0 --port 3000"
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/health/fleet').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  app_data:
  n8n_data:
  nextjs_next:
  nextjs_node_modules:
  postgres_data:
  qdrant_data:
  redis_data:
